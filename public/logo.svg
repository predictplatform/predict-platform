<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50" role="img" aria-label="دوري التوقعات">

  <defs>
    <!-- تدرج كرة القدم -->
    <radialGradient id="ballGrad" cx="38%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8d3de"/>
    </radialGradient>
    <!-- قطع البقع داخل الكرة -->
    <clipPath id="ballClip">
      <circle cx="25" cy="25" r="20"/>
    </clipPath>
  </defs>

  <!-- ─── كرة القدم ─────────────────────────────── -->
  <!-- جسم الكرة -->
  <circle cx="25" cy="25" r="20" fill="url(#ballGrad)"/>

  <!-- البقع السداسية/الخماسية مقصوصة بحدود الكرة -->
  <g clip-path="url(#ballClip)" fill="#1e293b">
    <!-- مضلع مركزي سداسي -->
    <polygon points="25,18 30,21.5 30,28.5 25,32 20,28.5 20,21.5"/>
    <!-- 5 بقع خارجية على محيط الكرة بزوايا 72° -->
    <!-- أعلى (0°)    --> <circle cx="25"   cy="7"    r="4.5"/>
    <!-- أعلى يمين (72°)  --> <circle cx="38"   cy="16.5" r="4"/>
    <!-- أسفل يمين (144°) --> <circle cx="33"   cy="36"   r="4"/>
    <!-- أسفل يسار (216°) --> <circle cx="17"   cy="36"   r="4"/>
    <!-- أعلى يسار (288°) --> <circle cx="12"   cy="16.5" r="4"/>
  </g>

  <!-- حافة الكرة -->
  <circle cx="25" cy="25" r="20" fill="none" stroke="#94a3b8" stroke-width="0.8"/>

  <!-- ─── فاصل ذهبي ─────────────────────────────── -->
  <line x1="52" y1="12" x2="52" y2="38"
        stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ─── نص الموقع ──────────────────────────────── -->
  <!-- "التوقعات" — سطر ثانٍ أصغر حجماً وأخف لوناً -->
  <text x="60" y="21"
        font-family="Tahoma,'Segoe UI','Arabic UI Display',Arial,sans-serif"
        font-size="11" font-weight="600"
        fill="#94a3b8"
        letter-spacing="0.3">التوقعات</text>

  <!-- "دوري" — سطر رئيسي كبير أبيض -->
  <text x="60" y="38"
        font-family="Tahoma,'Segoe UI','Arabic UI Display',Arial,sans-serif"
        font-size="19" font-weight="800"
        fill="#ffffff">دوري</text>

  <!-- ─── نقطة ذهبية صغيرة كـ accent ─────────────── -->
  <circle cx="97" cy="38" r="2.5" fill="#f59e0b"/>

</svg>
